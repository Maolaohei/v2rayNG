name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '14742923'
        packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;29.0.14206865"
        echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        bash compile-hevtun.sh
    
    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Get latest release tag from Maolaohei/AndroidLibXrayLite-Bray-Core-
      id: get_latest_tag
      run: |
        LATEST_TAG=$(curl -s https://api.github.com/repos/Maolaohei/AndroidLibXrayLite-Bray-Core-/releases/latest | jq -r .tag_name)
        echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
        echo "Latest tag is $LATEST_TAG"

    - name: Download libv2ray from latest release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        REPO="Maolaohei/AndroidLibXrayLite-Bray-Core-"
        # 对仓库名进行 URL 编码（中文转为 %E9%A1%B9%E7%9B%AE 形式）
        ENCODED_REPO=$(printf "%s" "$REPO" | jq -sRr @uri)
        echo "Encoded repo: $ENCODED_REPO"
        
        # 获取最新 release 信息（带认证，避免限流）
        API_URL="https://api.github.com/repos/$REPO/releases/latest"
        RELEASE_INFO=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$API_URL")
        
        # 调试：保存返回内容
        echo "$RELEASE_INFO" > release_info.json
        cat release_info.json
        
        # 检查是否有错误
        if echo "$RELEASE_INFO" | jq -e '.message' > /dev/null; then
          echo "GitHub API error: $(echo "$RELEASE_INFO" | jq -r '.message')"
          exit 1
        fi
        
        # 提取下载链接
        DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name=="libv2ray.aar") | .browser_download_url')
        if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
          echo "libv2ray.aar not found in latest release"
          echo "Available assets:"
          echo "$RELEASE_INFO" | jq '.assets[].name'
          exit 1
        fi
        
        mkdir -p V2rayNG/app/libs/
        curl -L -o V2rayNG/app/libs/libv2ray.aar "$DOWNLOAD_URL"
        echo "libv2ray.aar downloaded successfully"

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    # 注意：已删除 Decode Keystore 步骤，改用 Debug 签名

    - name: Build APK with Debug signature
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew assembleDebug
    
    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: arm64-v8a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/debug/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: armeabi-v7a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/debug/*armeabi-v7a*.apk

    - name: Upload x86 APK
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: x86-apk
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/debug/*x86*.apk

    - name: Upload to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != ''
      with:
        file: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/debug/*.apk
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        prerelease: true
