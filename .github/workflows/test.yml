name: Unit Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '14742923'
        packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;29.0.14206865"
        echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Download libv2ray
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        REPO="Maolaohei/AndroidLibXrayLite-Bray-Core-"
        API_URL="https://api.github.com/repos/$REPO/releases/latest"
        RELEASE_INFO=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$API_URL")
        DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name=="libv2ray.aar") | .browser_download_url')
        if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
          echo "libv2ray.aar not found in latest release"
          exit 1
        fi
        mkdir -p V2rayNG/app/libs/
        curl -L -o V2rayNG/app/libs/libv2ray.aar "$DOWNLOAD_URL"
        echo "libv2ray.aar downloaded successfully"

    - name: Run Unit Tests (fdroid)
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew testFdroidDebugUnitTest --no-daemon --stacktrace

    - name: Run Unit Tests (playstore)
      run: |
        cd ${{ github.workspace }}/V2rayNG
        ./gradlew testPlaystoreDebugUnitTest --no-daemon --stacktrace

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: |
          ${{ github.workspace }}/V2rayNG/app/build/reports/tests/
          ${{ github.workspace }}/V2rayNG/app/build/test-results/
        retention-days: 14

    - name: Publish Test Summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        for report in ${{ github.workspace }}/V2rayNG/app/build/test-results/**/TEST-*.xml; do
          if [ -f "$report" ]; then
            tests=$(grep -o 'tests="[0-9]*"' "$report" | head -1 | grep -o '[0-9]*')
            failures=$(grep -o 'failures="[0-9]*"' "$report" | head -1 | grep -o '[0-9]*')
            errors=$(grep -o 'errors="[0-9]*"' "$report" | head -1 | grep -o '[0-9]*')
            name=$(basename "$report" .xml | sed 's/TEST-//')
            echo "| Test Suite | Tests | Failures | Errors |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| $name | $tests | $failures | $errors |" >> $GITHUB_STEP_SUMMARY
          fi
        done
